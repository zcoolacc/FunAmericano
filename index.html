<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Americano Badminton Pro - Fair Play</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; margin: 0; 
        }
        .floating-btn-container {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 24rem;
            padding: 0 1rem;
            z-index: 40;
            pointer-events: none;
        }
        .floating-btn-container button {
            pointer-events: auto;
        }
        .sticky-nav {
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        @keyframes celebrate {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .final-rank-1 { animation: celebrate 2s infinite; }

        /* Hidden export container to force 9:16 ratio */
        #export-container {
            position: absolute;
            left: -9999px;
            top: 0;
            width: 1080px;
            height: 1920px;
            background: white;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('setup');
            const [players, setPlayers] = useState([]);
            const [newPlayerName, setNewPlayerName] = useState('');
            const [newPlayerGender, setNewPlayerGender] = useState('M');
            const [matches, setMatches] = useState([]);
            const [editingPlayerId, setEditingPlayerId] = useState(null); 
            const [isFinished, setIsFinished] = useState(false);
            const [sharedViewData, setSharedViewData] = useState(null);
            
            const [eventDetails, setEventDetails] = useState({
                title: '',
                location: '',
                date: new Date().toISOString().split('T')[0]
            });

            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const sharedDataRaw = urlParams.get('result');
                if (sharedDataRaw) {
                    try {
                        const decoded = JSON.parse(atob(sharedDataRaw));
                        setSharedViewData(decoded);
                        setEventDetails(decoded.event);
                        setView('standings');
                        setIsFinished(true);
                        return;
                    } catch (e) { console.error("Link tidak valid"); }
                }

                const p = localStorage.getItem('badminton_players');
                const m = localStorage.getItem('badminton_matches');
                const f = localStorage.getItem('badminton_finished');
                const ed = localStorage.getItem('badminton_event');
                if (p) setPlayers(JSON.parse(p));
                if (m) setMatches(JSON.parse(m));
                if (f) setIsFinished(JSON.parse(f));
                if (ed) setEventDetails(JSON.parse(ed));
            }, []);

            useEffect(() => {
                if (!sharedViewData) {
                    localStorage.setItem('badminton_players', JSON.stringify(players));
                    localStorage.setItem('badminton_matches', JSON.stringify(matches));
                    localStorage.setItem('badminton_finished', JSON.stringify(isFinished));
                    localStorage.setItem('badminton_event', JSON.stringify(eventDetails));
                }
            }, [players, matches, isFinished, eventDetails, sharedViewData]);

            const resetTournament = () => {
                if (sharedViewData) { window.location.href = window.location.pathname; return; }
                if (confirm("Konfirmasi: Hapus semua data dan mulai dari awal?")) {
                    localStorage.clear();
                    setPlayers([]);
                    setMatches([]);
                    setIsFinished(false);
                    setEventDetails({
                        title: '',
                        location: '',
                        date: new Date().toISOString().split('T')[0]
                    });
                    setView('setup');
                }
            };

            const addPlayer = () => {
                if (!newPlayerName.trim() || isFinished) return;
                setPlayers([...players, { 
                    id: Date.now().toString(), 
                    name: newPlayerName.trim(), 
                    gender: newPlayerGender, 
                    active: true 
                }]);
                setNewPlayerName('');
            };

            const removePlayer = (id) => {
                if (isFinished) return;
                const hasPlayed = matches.some(m => m.done && (m.t1.includes(id) || m.t2.includes(id)));
                if (hasPlayed) {
                    alert("Pemain ini sudah memiliki skor pertandingan dan tidak bisa dihapus!");
                    return;
                }
                if (confirm("Hapus pemain ini?")) {
                    setPlayers(players.filter(p => p.id !== id));
                    setMatches(matches.filter(m => !m.t1.includes(id) && !m.t2.includes(id)));
                }
            };

            const updatePlayerName = (id, newName) => {
                setPlayers(players.map(p => p.id === id ? { ...p, name: newName } : p));
            };

            const togglePlayer = (id) => {
                if (isFinished) return;
                setPlayers(players.map(p => p.id === id ? { ...p, active: !p.active } : p));
            };

            const setAllPlayersStatus = (status) => {
                if (isFinished) return;
                setPlayers(players.map(p => ({ ...p, active: status })));
            };

            const replacePlayer = (matchId, oldId, newId) => {
                setMatches(matches.map(m => {
                    if (m.id === matchId) {
                        const newT1 = m.t1.map(id => id === oldId ? newId : id);
                        const newT2 = m.t2.map(id => id === oldId ? newId : id);
                        return { ...m, t1: newT1, t2: newT2 };
                    }
                    return m;
                }));
            };

            const getPlayCount = (playerId) => {
                return matches.reduce((count, m) => {
                    return count + (m.t1.includes(playerId) || m.t2.includes(playerId) ? 1 : 0);
                }, 0);
            };

            const getConsecutiveCount = (playerId) => {
                let count = 0;
                for (let i = matches.length - 1; i >= 0; i--) {
                    if (matches[i].t1.includes(playerId) || matches[i].t2.includes(playerId)) {
                        count++;
                    } else {
                        break;
                    }
                }
                return count;
            };

            const havePlayedTogether = (p1Id, p2Id) => {
                return matches.some(m => 
                    (m.t1.includes(p1Id) && m.t1.includes(p2Id)) || 
                    (m.t2.includes(p1Id) && m.t2.includes(p2Id))
                );
            };

            const generateRound = () => {
                if (isFinished) return;
                let activePlayers = players.filter(p => p.active);
                if (activePlayers.length < 4) {
                    alert("Minimal butuh 4 pemain aktif!");
                    return;
                }

                const sorted = [...activePlayers].sort((a, b) => {
                    const diffPlay = getPlayCount(a.id) - getPlayCount(b.id);
                    if (diffPlay !== 0) return diffPlay;
                    return getConsecutiveCount(a.id) - getConsecutiveCount(b.id);
                });

                let selected = sorted.slice(0, 4);

                const newMatch = {
                    id: Date.now() + Math.random(),
                    matchNumber: matches.length + 1,
                    t1: [selected[0].id, selected[1].id],
                    t2: [selected[2].id, selected[3].id],
                    s1: 0, s2: 0, done: false, type: 'Doubles'
                };

                setMatches([...matches, newMatch]);
                setView('matches');
            };

            const getStandings = () => {
                if (sharedViewData) return sharedViewData.results;
                const stats = players.map(p => {
                    let pts = 0; let pf = 0; let pa = 0; let wins = 0; let loses = 0; let played = 0;
                    matches.filter(m => m.done).forEach(m => {
                        const s1 = parseInt(m.s1) || 0;
                        const s2 = parseInt(m.s2) || 0;
                        if (m.t1.includes(p.id)) { 
                            played++; pf += s1; pa += s2;
                            if (s1 > s2) wins++; else if (s1 < s2) loses++;
                        }
                        if (m.t2.includes(p.id)) { 
                            played++; pf += s2; pa += s1;
                            if (s2 > s1) wins++; else if (s2 < s1) loses++;
                        }
                    });
                    return { ...p, pts: wins, pf, pa, diff: pf - pa, wins, loses, played };
                });
                return stats.sort((a, b) => b.pts - a.pts || b.diff - a.diff || b.wins - a.wins);
            };

            const shareStandings = async () => {
                const element = document.getElementById('export-container');
                if (!element) return;
                
                const data = { event: eventDetails, results: getStandings(), shared: true };
                const encodedData = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
                const longUrl = `${window.location.origin}${window.location.pathname}?result=${encodedData}`;
                
                let shareUrl = longUrl;
                
                try {
                    const response = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(longUrl)}`);
                    if (response.ok) shareUrl = await response.text();
                } catch (err) { console.warn("Gagal memendekkan link."); }

                try {
                    // Show export container temporarily for rendering
                    element.style.left = "0px"; 
                    const canvas = await html2canvas(element, { 
                        backgroundColor: '#ffffff', 
                        scale: 2, 
                        width: 1080, 
                        height: 1920,
                        logging: false,
                        useCORS: true
                    });
                    element.style.left = "-9999px"; 

                    const dataUrl = canvas.toDataURL('image/png');
                    const blob = await (await fetch(dataUrl)).blob();
                    const file = new File([blob], 'Klasemen_WA.png', { type: 'image/png' });
                    
                    if (navigator.share) {
                        await navigator.share({
                            title: `Klasemen ${eventDetails.title || 'Badminton'}`,
                            text: `Cek Klasemen: ${shareUrl}`,
                            files: [file]
                        });
                    } else {
                        const link = document.createElement('a');
                        link.download = 'Klasemen_Americano.png';
                        link.href = dataUrl;
                        link.click();
                        navigator.clipboard.writeText(shareUrl);
                        alert("Gambar diunduh & Link disalin!");
                    }
                } catch (err) { console.error('Gagal berbagi:', err); }
            };

            const saveReport = () => {
                const standings = getStandings();
                let text = `REKAP AMERICANO\nEvent: ${eventDetails.title}\nLokasi: ${eventDetails.location}\nTanggal: ${eventDetails.date}\n\n`;
                standings.forEach((p, i) => {
                    text += `${i + 1}. ${p.name} - Menang: ${p.pts}, +/-: ${p.diff}\n`;
                });
                const blob = new Blob([text], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Rekap_Americano.txt`;
                a.click();
            };

            const finalizeCompetition = () => {
                if (matches.some(m => !m.done)) {
                    if(!confirm("Ada pertandingan belum selesai. Tetap akhiri?")) return;
                }
                if (confirm("Data tidak bisa diubah lagi. Lanjutkan?")) {
                    setIsFinished(true);
                    setView('standings');
                }
            };

            const getPName = (id) => players.find(p => p.id === id)?.name || "N/A";
            const getPGender = (id) => players.find(p => p.id === id)?.gender || "M";
            const handleScoreFocus = (e) => { if (e.target.value === "0") e.target.value = ""; };

            const standingsData = getStandings();
            // Limit shown players in image to fit 9:16 nicely (approx top 15)
            const topPlayersForImage = standingsData.slice(0, 15);

            return (
                <div className={`max-w-md mx-auto min-h-screen bg-slate-50 pb-44 relative ${isFinished ? 'ring-8 ring-amber-400/20' : ''}`}>
                    {/* HIDDEN EXPORT AREA (9:16) */}
                    <div id="export-container" className="p-12">
                        <div className="text-center mb-10 pt-10">
                            <h1 className="text-6xl font-black italic uppercase tracking-tighter text-slate-900">Americano <span className="text-indigo-600">Pro</span></h1>
                            <div className="mt-6 bg-slate-900 text-white py-4 px-8 inline-block rounded-3xl text-2xl font-bold uppercase tracking-widest">
                                {eventDetails.title || 'FINAL STANDINGS'}
                            </div>
                            <p className="text-xl text-slate-400 mt-4 font-bold uppercase tracking-[0.3em]">
                                {eventDetails.location} • {eventDetails.date}
                            </p>
                        </div>
                        
                        <div className="flex-1 bg-white rounded-[4rem] border-[6px] border-slate-100 overflow-hidden shadow-2xl">
                            <table className="w-full text-left">
                                <thead className="bg-slate-50 border-b-4 border-slate-100">
                                    <tr>
                                        <th className="py-10 px-8 text-center text-3xl font-black text-slate-400">#</th>
                                        <th className="py-10 px-4 text-3xl font-black text-slate-400">PLAYER</th>
                                        <th className="py-10 px-4 text-center text-3xl font-black text-slate-400">MP</th>
                                        <th className="py-10 px-4 text-center text-3xl font-black text-slate-400">+/-</th>
                                        <th className="py-10 px-8 text-center text-3xl font-black text-indigo-600 bg-indigo-50">WIN</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y-4 divide-slate-50">
                                    {topPlayersForImage.map((p, i) => (
                                        <tr key={i} className={i === 0 ? 'bg-amber-50' : ''}>
                                            <td className="py-8 px-8 text-center font-black text-4xl text-slate-300">{i + 1}</td>
                                            <td className="py-8 px-4 font-black text-4xl uppercase text-slate-800">{p.name}</td>
                                            <td className="py-8 px-4 text-center font-bold text-3xl">{p.played}</td>
                                            <td className={`py-8 px-4 text-center font-black text-3xl ${p.diff > 0 ? 'text-emerald-500' : 'text-rose-500'}`}>{p.diff}</td>
                                            <td className="py-8 px-8 text-center bg-indigo-50/30">
                                                <span className="font-black text-indigo-600 text-5xl">{p.pts}</span>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            {standingsData.length > 15 && (
                                <div className="p-8 text-center text-slate-400 text-2xl font-bold italic">
                                    + {standingsData.length - 15} pemain lainnya...
                                </div>
                            )}
                        </div>
                        <div className="mt-10 text-center text-slate-300 font-black text-xl tracking-widest uppercase">
                            Generated by Americano Pro - Fair Play App
                        </div>
                    </div>

                    {/* REGULAR APP UI */}
                    <header className="bg-slate-900 text-white p-6 shadow-xl flex justify-between items-start">
                        <div>
                            <h1 className="text-xl font-black italic uppercase tracking-tighter">Americano <span className="text-indigo-400">Pro</span></h1>
                            <p className="text-[10px] opacity-60 font-bold tracking-[0.2em] mt-1 uppercase text-indigo-200">
                                {isFinished ? 'COMPETITION COMPLETED' : 'Fairness & Smart Queue'}
                            </p>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={resetTournament} className="bg-slate-700 hover:bg-slate-600 text-[10px] font-black px-3 py-2 rounded-xl">
                                {sharedViewData ? "MULAI BARU" : "RE-START"}
                            </button>
                            {!isFinished ? (
                                <button onClick={finalizeCompetition} className="bg-rose-600 hover:bg-rose-700 text-[10px] font-black px-4 py-2 rounded-xl shadow-lg">AKHIRI</button>
                            ) : (
                                <div className="bg-amber-50 text-[10px] font-black px-4 py-2 rounded-xl shadow-lg text-amber-600 uppercase">FINAL</div>
                            )}
                        </div>
                    </header>

                    {!sharedViewData && (
                        <nav className="sticky top-0 z-40 bg-slate-50/80 sticky-nav flex px-4 gap-2 py-4 mb-2 shadow-sm border-b border-slate-100">
                            {['setup', 'matches', 'standings'].map(v => (
                                <button key={v} onClick={() => setView(v)} className={`flex-1 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all ${view === v ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white text-slate-400 border border-slate-100'}`}>
                                    {v === 'setup' ? 'Pemain' : v === 'matches' ? 'Pertandingan' : 'Klasemen'}
                                </button>
                            ))}
                        </nav>
                    )}

                    <div className="px-4 mt-4">
                        {view === 'setup' && (
                            <div className="space-y-4 pb-10">
                                {!isFinished && (
                                    <>
                                        <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                                            <h2 className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Detail Event</h2>
                                            <div className="space-y-3">
                                                <input className="w-full p-3 bg-slate-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-sm" placeholder="Nama Event" value={eventDetails.title} onChange={e => setEventDetails({...eventDetails, title: e.target.value})} />
                                                <div className="flex gap-2">
                                                    <input className="flex-1 p-3 bg-slate-50 rounded-xl outline-none text-xs font-bold" placeholder="Lokasi" value={eventDetails.location} onChange={e => setEventDetails({...eventDetails, location: e.target.value})} />
                                                    <input type="date" className="flex-1 p-3 bg-slate-50 rounded-xl outline-none text-xs font-bold" value={eventDetails.date} onChange={e => setEventDetails({...eventDetails, date: e.target.value})} />
                                                </div>
                                            </div>
                                        </div>
                                        <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                                            <input className="w-full p-4 bg-slate-50 rounded-2xl mb-4 outline-none font-bold text-lg" placeholder="Nama" value={newPlayerName} onChange={e => setNewPlayerName(e.target.value)} />
                                            <div className="flex gap-2 mb-4">
                                                <button onClick={() => setNewPlayerGender('M')} className={`flex-1 py-4 rounded-2xl font-black ${newPlayerGender==='M'?'bg-blue-600 text-white shadow-lg':'bg-slate-50 text-slate-400'}`}>♂ PRIA</button>
                                                <button onClick={() => setNewPlayerGender('W')} className={`flex-1 py-4 rounded-2xl font-black ${newPlayerGender==='W'?'bg-pink-600 text-white shadow-lg':'bg-slate-50 text-slate-400'}`}>♀ WANITA</button>
                                            </div>
                                            <button onClick={addPlayer} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black uppercase text-xs">Tambah Pemain</button>
                                        </div>
                                    </>
                                )}
                                <div className="space-y-3">
                                    {players.map(p => (
                                        <div key={p.id} className={`flex justify-between items-center p-4 rounded-2xl border-2 ${p.active?'bg-white border-white shadow-sm':'bg-slate-100 border-transparent opacity-50'}`}>
                                            <div className="flex items-center gap-3">
                                                <div className={`w-10 h-10 rounded-full flex items-center justify-center font-black text-xs ${p.gender==='M'?'bg-blue-50 text-blue-600':'bg-pink-50 text-pink-600'}`}>{p.gender}</div>
                                                <div className="font-black text-slate-800 text-sm">{p.name}</div>
                                            </div>
                                            {!isFinished && <button onClick={() => togglePlayer(p.id)} className={`text-[9px] font-black px-4 py-2 rounded-xl ${p.active?'bg-indigo-600 text-white':'bg-white text-slate-400 border'}`}>{p.active ? 'MAIN' : 'OFF'}</button>}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'matches' && (
                            <div className="space-y-4 pb-10">
                                {matches.map(m => (
                                    <div key={m.id} className={`bg-white p-5 rounded-[2.5rem] border-2 ${m.done?'border-slate-50 opacity-90':'border-indigo-100 shadow-xl'}`}>
                                        <div className="flex justify-between items-center mb-4">
                                            <span className="text-[11px] font-black text-slate-900 uppercase">GAME {m.matchNumber}</span>
                                            {(m.done && !isFinished) && <button onClick={() => setMatches(matches.map(ma => ma.id === m.id ? {...ma, done: false} : ma))} className="text-[9px] font-black text-indigo-400 uppercase">Edit</button>}
                                        </div>
                                        <div className="space-y-6">
                                            {[1, 2].map(teamNum => (
                                                <div key={teamNum} className="flex items-center justify-between gap-4">
                                                    <div className="flex-1 space-y-1">
                                                        {(teamNum === 1 ? m.t1 : m.t2).map(playerId => (
                                                            <div key={playerId} className="text-sm font-black flex items-center gap-2">
                                                                <div className={`w-1.5 h-1.5 rounded-full ${getPGender(playerId)==='M'?'bg-blue-400':'bg-pink-400'}`}></div>
                                                                <span>{getPName(playerId)}</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                    <input type="number" disabled={m.done || isFinished} onFocus={handleScoreFocus} className={`w-14 h-14 text-center rounded-2xl font-black text-xl ${(m.done || isFinished) ? 'bg-indigo-50 text-indigo-900' : 'bg-slate-100'}`} value={teamNum === 1 ? m.s1 : m.s2} onChange={e => setMatches(matches.map(ma => ma.id === m.id ? {...ma, [teamNum===1?'s1':'s2']: parseInt(e.target.value)||0} : ma))} />
                                                </div>
                                            ))}
                                            {(!m.done && !isFinished) && <button onClick={() => setMatches(matches.map(ma => ma.id === m.id ? {...ma, done: true} : ma))} className="w-full py-4 bg-indigo-600 text-white rounded-2xl text-[10px] font-black uppercase">SIMPAN SKOR</button>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'standings' && (
                            <div className="pb-10">
                                {isFinished && (
                                    <div className="bg-amber-50 border-2 border-amber-200 rounded-3xl p-6 mb-6 text-center">
                                        <h3 className="text-amber-800 font-black text-lg uppercase mb-1">{eventDetails.title || "HASIL PERTANDINGAN"}</h3>
                                        <div className="flex flex-wrap gap-2 justify-center mt-4">
                                            <button onClick={shareStandings} className="bg-indigo-600 text-white py-3 px-6 rounded-2xl text-[10px] font-black uppercase shadow-lg">📤 Share Status WA</button>
                                            <button onClick={saveReport} className="bg-white text-amber-700 border-2 border-amber-200 py-3 px-6 rounded-2xl text-[10px] font-black uppercase">💾 Rekap Teks</button>
                                        </div>
                                    </div>
                                )}
                                <div id="standings-table" className="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[9px] font-black uppercase text-slate-400">
                                            <tr>
                                                <th className="py-5 px-4 text-center">Pos</th>
                                                <th className="py-5 px-2">Pemain</th>
                                                <th className="py-5 px-2 text-center">MP</th>
                                                <th className="py-5 px-4 text-center bg-indigo-50 text-indigo-600">Win</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y">
                                            {standingsData.map((p, i) => (
                                                <tr key={i} className={isFinished && i === 0 ? 'bg-amber-50/50' : ''}>
                                                    <td className="py-5 px-4 text-center font-black text-xs text-slate-300">{i + 1}</td>
                                                    <td className="py-5 px-2 font-black text-xs uppercase">{p.name}</td>
                                                    <td className="py-5 px-2 text-center font-bold text-xs">{p.played}</td>
                                                    <td className="py-5 px-4 text-center font-black text-indigo-600 text-sm">{p.pts}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </div>

                    {((view === 'setup' || view === 'matches') && !isFinished) && (
                        <div className="floating-btn-container">
                            <button onClick={generateRound} className="w-full py-5 bg-slate-900 text-white rounded-3xl font-black shadow-2xl uppercase text-xs border-4 border-white">
                                {matches.length === 0 ? "START" : "NEXT MATCH"}
                            </button>
                        </div>
                    )}

                    {!sharedViewData && (
                        <div className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl p-5 border-t flex justify-around text-[9px] font-black text-slate-400 max-w-md mx-auto z-50 rounded-t-[2.5rem] shadow-2xl">
                            <div className="text-center"><p className="text-blue-600 text-base">{players.filter(p=>p.active && p.gender==='M').length}</p><p>♂ Pria</p></div>
                            <div className="text-center"><p className="text-pink-600 text-base">{players.filter(p=>p.active && p.gender==='W').length}</p><p>♀ Wanita</p></div>
                            <div className="text-center"><p className="text-indigo-600 text-base">{matches.length}</p><p>Match</p></div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
