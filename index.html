<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Americano Badminton Pro - Standings Fixed</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; margin: 0; 
        }
        .floating-btn-container {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 24rem;
            padding: 0 1rem;
            z-index: 40;
            pointer-events: none;
        }
        .floating-btn-container button {
            pointer-events: auto;
        }
        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('setup');
            const [players, setPlayers] = useState([]);
            const [newPlayerName, setNewPlayerName] = useState('');
            const [newPlayerGender, setNewPlayerGender] = useState('M');
            const [matches, setMatches] = useState([]);
            const [isFinished, setIsFinished] = useState(false);
            const [sharedViewData, setSharedViewData] = useState(null);
            
            const [eventDetails, setEventDetails] = useState({
                title: '',
                location: '',
                date: new Date().toISOString().split('T')[0]
            });

            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const sharedDataRaw = urlParams.get('result');
                if (sharedDataRaw) {
                    try {
                        const decoded = JSON.parse(atob(sharedDataRaw));
                        setSharedViewData(decoded);
                        setEventDetails(decoded.event);
                        setView('standings');
                        setIsFinished(true);
                    } catch (e) { console.error("Link tidak valid"); }
                }
            }, []);

            const getStandings = () => {
                if (sharedViewData) return sharedViewData.results;
                const stats = players.map(p => {
                    let wins = 0; let pf = 0; let pa = 0; let played = 0;
                    matches.filter(m => m.done).forEach(m => {
                        const s1 = parseInt(m.s1) || 0;
                        const s2 = parseInt(m.s2) || 0;
                        if (m.t1.includes(p.id)) { 
                            played++; pf += s1; pa += s2;
                            if (s1 > s2) wins++;
                        }
                        if (m.t2.includes(p.id)) { 
                            played++; pf += s2; pa += s1;
                            if (s2 > s1) wins++;
                        }
                    });
                    return { ...p, pts: wins, pf, pa, diff: pf - pa, wins, played };
                });
                return stats.sort((a, b) => b.pts - a.pts || b.diff - a.diff);
            };

            const shareStandings = async () => {
                const element = document.getElementById('standings-table');
                try {
                    const canvas = await html2canvas(element, { backgroundColor: '#ffffff', scale: 3 });
                    const dataUrl = canvas.toDataURL('image/png');
                    const link = document.createElement('a');
                    link.download = `Klasemen_${eventDetails.title || 'Badminton'}.png`;
                    link.href = dataUrl;
                    link.click();
                } catch (err) { alert('Gagal membuat gambar'); }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 pb-32">
                    <header className="bg-slate-900 text-white p-6 shadow-xl flex justify-between items-center">
                        <h1 className="text-xl font-black italic uppercase">Americano <span className="text-indigo-400">Pro</span></h1>
                        {isFinished && <div className="bg-amber-400 text-slate-900 text-[10px] font-black px-3 py-1 rounded-full">FINAL</div>}
                    </header>

                    <div className="p-4">
                        {/* Tab Navigation */}
                        {!sharedViewData && (
                            <div className="flex gap-2 mb-6">
                                {['setup', 'matches', 'standings'].map(v => (
                                    <button key={v} onClick={() => setView(v)} className={`flex-1 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest ${view === v ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white text-slate-400 border'}`}>
                                        {v === 'setup' ? 'Pemain' : v === 'matches' ? 'Skor' : 'Klasemen'}
                                    </button>
                                ))}
                            </div>
                        )}

                        {view === 'standings' && (
                            <div className="animate-in fade-in duration-500">
                                <div id="standings-table" className="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-slate-100">
                                    <div className="p-8 text-center bg-white">
                                        <h2 className="font-black text-2xl uppercase text-slate-900">{eventDetails.title || 'BADMINTON'}</h2>
                                        <p className="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-[0.2em]">
                                            {eventDetails.location} • {eventDetails.date}
                                        </p>
                                    </div>
                                    
                                    <div className="table-responsive">
                                        <table className="w-full">
                                            <thead className="bg-slate-50/50 text-[9px] font-black uppercase text-slate-400">
                                                <tr>
                                                    <th className="py-5 px-4 text-center">POS</th>
                                                    <th className="py-5 px-2 text-left">PEMAIN</th>
                                                    <th className="py-5 px-2 text-center">MP</th>
                                                    <th className="py-5 px-2 text-center">+/-</th>
                                                    <th className="py-5 px-6 text-center text-indigo-600">WIN</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {getStandings().map((p, i) => (
                                                    <tr key={i} className={i === 0 ? 'bg-amber-50/30' : ''}>
                                                        <td className="py-6 px-4 text-center font-black text-slate-300">{i + 1}</td>
                                                        <td className="py-6 px-2 font-black text-sm uppercase text-slate-800">{p.name}</td>
                                                        <td className="py-6 px-2 text-center font-bold text-slate-600">{p.played}</td>
                                                        <td className={`py-6 px-2 text-center font-black ${p.diff >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>{p.diff}</td>
                                                        <td className="py-6 px-6 text-center">
                                                            {/* Hapus background kotak ungu, ganti ke teks indigo tebal murni */}
                                                            <span className="text-lg font-black text-indigo-600 block">
                                                                {p.pts}
                                                            </span>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                
                                <div className="mt-6 flex flex-col gap-3">
                                    <button onClick={shareStandings} className="w-full py-4 bg-indigo-600 text-white rounded-3xl font-black uppercase text-xs shadow-lg">Unduh Klasemen (PNG)</button>
                                    <button onClick={() => { localStorage.clear(); window.location.reload(); }} className="w-full py-4 bg-slate-200 text-slate-600 rounded-3xl font-black uppercase text-xs">Mulai Turnamen Baru</button>
                                </div>
                            </div>
                        )}
                        
                        {view === 'setup' && (
                           <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
                               <p className="text-center text-slate-400 font-bold py-10">Silakan isi detail event dan pemain di sini.</p>
                               <input className="w-full p-4 bg-slate-50 rounded-2xl mb-2 outline-none font-bold" placeholder="Nama Event" value={eventDetails.title} onChange={e => setEventDetails({...eventDetails, title: e.target.value})} />
                               <button onClick={() => setView('standings')} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black mt-4 uppercase text-xs">Simpan & Lihat Klasemen</button>
                           </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
