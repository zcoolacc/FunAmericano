<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Americano Badminton Pro - Fair Play</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; margin: 0; 
        }
        .floating-btn-container {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 24rem;
            padding: 0 1rem;
            z-index: 40;
            pointer-events: none;
        }
        .floating-btn-container button {
            pointer-events: auto;
        }
        .sticky-nav {
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
        @keyframes celebrate {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .final-rank-1 { animation: celebrate 2s infinite; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('setup');
            const [players, setPlayers] = useState([]);
            const [newPlayerName, setNewPlayerName] = useState('');
            const [newPlayerGender, setNewPlayerGender] = useState('M');
            const [matches, setMatches] = useState([]);
            const [editingId, setEditingId] = useState(null);
            const [isFinished, setIsFinished] = useState(false);
            
            const [eventDetails, setEventDetails] = useState({
                title: '',
                location: '',
                date: new Date().toISOString().split('T')[0]
            });

            // Password Konfigurasi
            const RESTART_PASSWORD = "admin"; 

            useEffect(() => {
                const p = localStorage.getItem('badminton_players');
                const m = localStorage.getItem('badminton_matches');
                const f = localStorage.getItem('badminton_finished');
                const ed = localStorage.getItem('badminton_event');
                if (p) setPlayers(JSON.parse(p));
                if (m) setMatches(JSON.parse(m));
                if (f) setIsFinished(JSON.parse(f));
                if (ed) setEventDetails(JSON.parse(ed));
            }, []);

            useEffect(() => {
                localStorage.setItem('badminton_players', JSON.stringify(players));
                localStorage.setItem('badminton_matches', JSON.stringify(matches));
                localStorage.setItem('badminton_finished', JSON.stringify(isFinished));
                localStorage.setItem('badminton_event', JSON.stringify(eventDetails));
            }, [players, matches, isFinished, eventDetails]);

            const resetTournament = () => {
                const pw = prompt("Masukkan password untuk restart turnamen:");
                
                if (pw === null) return; // User cancel prompt

                if (pw === RESTART_PASSWORD) {
                    if (confirm("Konfirmasi: Hapus semua data dan mulai dari awal?")) {
                        localStorage.clear();
                        setPlayers([]);
                        setMatches([]);
                        setIsFinished(false);
                        setEventDetails({
                            title: '',
                            location: '',
                            date: new Date().toISOString().split('T')[0]
                        });
                        setView('setup');
                    }
                } else {
                    alert("Password salah! Data tidak dihapus.");
                }
            };

            const addPlayer = () => {
                if (!newPlayerName.trim() || isFinished) return;
                setPlayers([...players, { 
                    id: Date.now().toString(), 
                    name: newPlayerName.trim(), 
                    gender: newPlayerGender, 
                    active: true 
                }]);
                setNewPlayerName('');
            };

            const updatePlayerName = (id, newName) => {
                if (isFinished) return;
                setPlayers(players.map(p => p.id === id ? { ...p, name: newName } : p));
            };

            const togglePlayer = (id) => {
                if (isFinished) return;
                setPlayers(players.map(p => p.id === id ? { ...p, active: !p.active } : p));
            };

            const setAllPlayersStatus = (status) => {
                if (isFinished) return;
                setPlayers(players.map(p => ({ ...p, active: status })));
            };

            const getPlayCount = (playerId) => {
                return matches.reduce((count, m) => {
                    return count + (m.t1.includes(playerId) || m.t2.includes(playerId) ? 1 : 0);
                }, 0);
            };

            const isLastMatchPlayer = (playerId) => {
                if (matches.length === 0) return false;
                const lastMatch = matches[matches.length - 1];
                return lastMatch.t1.includes(playerId) || lastMatch.t2.includes(playerId);
            };

            const havePlayedTogether = (p1Id, p2Id) => {
                return matches.some(m => 
                    (m.t1.includes(p1Id) && m.t1.includes(p2Id)) || 
                    (m.t2.includes(p1Id) && m.t2.includes(p2Id))
                );
            };

            const swapPlayerInMatch = (matchId, oldPlayerId, newPlayerId) => {
                if (isFinished) return;
                setMatches(matches.map(m => {
                    if (m.id !== matchId) return m;
                    const newT1 = m.t1.map(id => id === oldPlayerId ? newPlayerId : id);
                    const newT2 = m.t2.map(id => id === oldPlayerId ? newPlayerId : id);
                    return { ...m, t1: newT1, t2: newT2 };
                }));
            };

            const generateRound = () => {
                if (isFinished) return;
                const activePlayers = players.filter(p => p.active);
                const activeWomen = activePlayers.filter(p => p.gender === 'W');
                const activeMen = activePlayers.filter(p => p.gender === 'M');

                if (activePlayers.length < 4) {
                    alert("Minimal butuh 4 pemain aktif untuk membuat pertandingan.");
                    return;
                }

                let selected = [];
                
                if (matches.length === 0 && activeWomen.length % 2 !== 0 && activeMen.length >= 3 && activeWomen.length >= 1) {
                    const sortedWomen = [...activeWomen].sort(() => Math.random() - 0.5);
                    const sortedMen = [...activeMen].sort(() => Math.random() - 0.5);
                    selected = [sortedWomen[0], sortedMen[0], sortedMen[1], sortedMen[2]];
                } else {
                    const queue = [...activePlayers]
                        .map(p => ({ 
                            ...p, 
                            playCount: getPlayCount(p.id),
                            playedLast: isLastMatchPlayer(p.id) ? 1 : 0 
                        }))
                        .sort((a, b) => {
                            if (a.playCount !== b.playCount) return a.playCount - b.playCount;
                            if (a.playedLast !== b.playedLast) return a.playedLast - b.playedLast;
                            return Math.random() - 0.5;
                        });
                    
                    let wCount = 0;
                    for (let i = 0; i < queue.length; i++) {
                        const p = queue[i];
                        const tempW = wCount + (p.gender === 'W' ? 1 : 0);
                        
                        if (selected.length === 3) {
                            if (tempW === 1 || tempW === 3) {
                                const alternative = queue.slice(i + 1).find(alt => {
                                    const altW = wCount + (alt.gender === 'W' ? 1 : 0);
                                    return altW !== 1 && altW !== 3;
                                });
                                if (alternative) {
                                    selected.push(alternative);
                                    break;
                                }
                            }
                        }
                        selected.push(p);
                        if (p.gender === 'W') wCount++;
                        if (selected.length === 4) break;
                    }
                }

                if (selected.length < 4) selected = activePlayers.slice(0, 4).sort(() => Math.random() - 0.5);

                let t1, t2, type;
                const women = selected.filter(p => p.gender === 'W');
                const men = selected.filter(p => p.gender === 'M');

                if (women.length === 2 && men.length === 2) {
                    type = 'Mixed';
                    if (havePlayedTogether(men[0].id, women[0].id)) {
                        t1 = [men[0].id, women[1].id];
                        t2 = [men[1].id, women[0].id];
                    } else {
                        t1 = [men[0].id, women[0].id];
                        t2 = [men[1].id, women[1].id];
                    }
                } else {
                    if (women.length === 1 && men.length === 3) type = 'Open (1W 3M)';
                    else if (women.length === 3 && men.length === 1) type = 'Open (3W 1M)';
                    else if (women.length === 4) type = 'Women';
                    else if (men.length === 4) type = 'Men';
                    else type = 'Open';

                    const p0 = selected[0];
                    const candidates = selected.slice(1);
                    
                    let partnerIdx = 0;
                    for (let i = 0; i < candidates.length; i++) {
                        if (!havePlayedTogether(p0.id, candidates[i].id)) {
                            partnerIdx = i;
                            break;
                        }
                    }

                    const partner = candidates[partnerIdx];
                    const opponents = candidates.filter((_, idx) => idx !== partnerIdx);

                    t1 = [p0.id, partner.id];
                    t2 = [opponents[0].id, opponents[1].id];
                }

                const newMatch = {
                    id: Date.now() + Math.random(),
                    matchNumber: matches.length + 1,
                    t1: t1,
                    t2: t2,
                    s1: 0, s2: 0, done: false, type: type
                };

                setMatches([...matches, newMatch]);
                setView('matches');
            };

            const getStandings = () => {
                const stats = players.map(p => {
                    let pts = 0; let pf = 0; let pa = 0; let wins = 0; let loses = 0; let played = 0;
                    matches.filter(m => m.done).forEach(m => {
                        const s1 = parseInt(m.s1) || 0;
                        const s2 = parseInt(m.s2) || 0;
                        if (m.t1.includes(p.id)) { 
                            played++; pf += s1; pa += s2;
                            if (s1 > s2) wins++; else if (s1 < s2) loses++;
                        }
                        if (m.t2.includes(p.id)) { 
                            played++; pf += s2; pa += s1;
                            if (s2 > s1) wins++; else if (s2 < s1) loses++;
                        }
                    });
                    pts = wins;
                    return { ...p, pts, pf, pa, diff: pf - pa, wins, loses, played };
                });
                return stats.sort((a, b) => b.pts - a.pts || b.diff - a.diff || b.wins - a.wins);
            };

            const shareStandings = async () => {
                const element = document.getElementById('standings-table');
                if (!element) return;

                try {
                    const canvas = await html2canvas(element, {
                        backgroundColor: '#f8fafc',
                        scale: 2,
                        logging: false
                    });
                    
                    const dataUrl = canvas.toDataURL('image/png');
                    const blob = await (await fetch(dataUrl)).blob();
                    const file = new File([blob], 'Klasemen_Americano.png', { type: 'image/png' });

                    if (navigator.share) {
                        await navigator.share({
                            title: `Klasemen ${eventDetails.title || 'Americano Badminton'}`,
                            text: `Cek hasil pertandingan Americano Badminton Pro! 🏸\nEvent: ${eventDetails.title || '-'}`,
                            url: window.location.href,
                            files: [file]
                        });
                    } else {
                        const link = document.createElement('a');
                        link.download = 'Klasemen_Americano.png';
                        link.href = dataUrl;
                        link.click();
                        alert("Gambar berhasil diunduh.");
                    }
                } catch (err) {
                    console.error('Gagal berbagi:', err);
                }
            };

            const saveReport = () => {
                const standings = getStandings();
                let text = `REKAP KOMPETISI BADMINTON AMERICANO\n`;
                text += `Event: ${eventDetails.title || '-'}\n`;
                text += `Lokasi: ${eventDetails.location || '-'}\n`;
                text += `Tanggal: ${eventDetails.date || '-'}\n\n`;
                text += `HASIL KLASEMEN AKHIR (Poin = Menang):\n`;
                standings.forEach((p, i) => {
                    text += `${i + 1}. ${p.name} (${p.gender}) - Menang: ${p.pts}, +/-: ${p.diff}\n`;
                });
                text += `\nRIWAYAT PERTANDINGAN:\n`;
                matches.forEach(m => {
                    text += `Game ${m.matchNumber} [${m.type}]: ${getPName(m.t1[0])}/${getPName(m.t1[1])} (${m.s1}) vs ${getPName(m.t2[0])}/${getPName(m.t2[1])} (${m.s2}) - ${m.done ? 'SELESAI' : 'BELUM'}\n`;
                });

                const blob = new Blob([text], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Rekap_Americano_${eventDetails.title || 'Event'}.txt`;
                a.click();
            };

            const finalizeCompetition = () => {
                if (matches.some(m => !m.done)) {
                    if(!confirm("Masih ada pertandingan yang belum selesai. Tetap akhiri?")) return;
                }
                if (confirm("Setelah diakhiri, data tidak bisa diubah lagi. Lanjutkan?")) {
                    setIsFinished(true);
                    setView('standings');
                }
            };

            const getPName = (id) => players.find(p => p.id === id)?.name || "N/A";
            const getPGender = (id) => players.find(p => p.id === id)?.gender || "M";

            const handleScoreFocus = (event) => {
                if (event.target.value === "0") event.target.value = "";
            };

            return (
                <div className={`max-w-md mx-auto min-h-screen bg-slate-50 pb-44 relative ${isFinished ? 'ring-8 ring-amber-400/20' : ''}`}>
                    <header className="bg-slate-900 text-white p-6 shadow-xl flex justify-between items-start">
                        <div>
                            <h1 className="text-xl font-black italic uppercase tracking-tighter">Americano <span className="text-indigo-400">Pro</span></h1>
                            <p className="text-[10px] opacity-60 font-bold tracking-[0.2em] mt-1 uppercase text-indigo-200">
                                {isFinished ? 'COMPETITION COMPLETED' : 'Balanced & Smart Queue'}
                            </p>
                        </div>
                        <div className="flex gap-2">
                            <button 
                                onClick={resetTournament}
                                className="bg-slate-700 hover:bg-slate-600 text-[10px] font-black px-3 py-2 rounded-xl transition-all"
                            >
                                RE-START
                            </button>
                            {!isFinished ? (
                                <button 
                                    onClick={finalizeCompetition}
                                    className="bg-rose-600 hover:bg-rose-700 text-[10px] font-black px-4 py-2 rounded-xl shadow-lg shadow-rose-900/20 active:scale-95 transition-all"
                                >
                                    AKHIRI
                                </button>
                            ) : (
                                <div className="bg-amber-500 text-[10px] font-black px-4 py-2 rounded-xl shadow-lg">FINAL</div>
                            )}
                        </div>
                    </header>

                    <nav className="sticky top-0 z-40 bg-slate-50/80 sticky-nav flex px-4 gap-2 py-4 mb-2 shadow-sm border-b border-slate-100">
                        {['setup', 'matches', 'standings'].map(v => (
                            <button key={v} onClick={() => setView(v)} className={`flex-1 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all ${view === v ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'bg-white text-slate-400 border border-slate-100'}`}>
                                {v === 'setup' ? 'Pemain' : v === 'matches' ? 'Pertandingan' : 'Klasemen'}
                            </button>
                        ))}
                    </nav>

                    <div className="px-4">
                        {view === 'setup' && (
                            <div className="space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                {!isFinished && (
                                    <>
                                        <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                                            <h2 className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Detail Event</h2>
                                            <div className="space-y-3">
                                                <input 
                                                    className="w-full p-3 bg-slate-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-sm border-2 border-transparent transition-all" 
                                                    placeholder="Nama Event / Keterangan" 
                                                    value={eventDetails.title} 
                                                    onChange={e => setEventDetails({...eventDetails, title: e.target.value})} 
                                                />
                                                <div className="flex gap-2">
                                                    <input 
                                                        className="flex-1 p-3 bg-slate-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-xs border-2 border-transparent transition-all" 
                                                        placeholder="Lokasi" 
                                                        value={eventDetails.location} 
                                                        onChange={e => setEventDetails({...eventDetails, location: e.target.value})} 
                                                    />
                                                    <input 
                                                        type="date"
                                                        className="flex-1 p-3 bg-slate-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-xs border-2 border-transparent transition-all" 
                                                        value={eventDetails.date} 
                                                        onChange={e => setEventDetails({...eventDetails, date: e.target.value})} 
                                                    />
                                                </div>
                                            </div>
                                        </div>

                                        <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                                            <h2 className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Registrasi Pemain</h2>
                                            <input className="w-full p-4 bg-slate-50 rounded-2xl mb-4 outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-lg border-2 border-transparent transition-all" placeholder="Nama" value={newPlayerName} onChange={e => setNewPlayerName(e.target.value)} />
                                            <div className="flex gap-2 mb-4">
                                                <button onClick={() => setNewPlayerGender('M')} className={`flex-1 py-4 rounded-2xl font-black transition-all ${newPlayerGender==='M'?'bg-blue-600 text-white shadow-lg shadow-blue-100':'bg-slate-50 text-slate-400'}`}>♂ PRIA</button>
                                                <button onClick={() => setNewPlayerGender('W')} className={`flex-1 py-4 rounded-2xl font-black transition-all ${newPlayerGender==='W'?'bg-pink-600 text-white shadow-lg shadow-pink-100':'bg-slate-50 text-slate-400'}`}>♀ WANITA</button>
                                            </div>
                                            <button onClick={addPlayer} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all text-xs tracking-widest uppercase">Tambah Pemain</button>
                                        </div>
                                    </>
                                )}
                                
                                <div className="space-y-3 pb-10">
                                    <div className="flex justify-between items-end px-2">
                                        <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest">Daftar Pemain ({players.length})</h3>
                                    </div>
                                    
                                    {players.length > 0 && !isFinished && (
                                        <div className="flex gap-2 px-2">
                                            <button onClick={() => setAllPlayersStatus(true)} className="flex-1 py-2 bg-indigo-50 text-indigo-600 rounded-xl text-[9px] font-black uppercase tracking-tighter border border-indigo-100">Mainkan Semua</button>
                                            <button onClick={() => setAllPlayersStatus(false)} className="flex-1 py-2 bg-slate-100 text-slate-500 rounded-xl text-[9px] font-black uppercase tracking-tighter border border-slate-200">Istirahatkan Semua</button>
                                        </div>
                                    )}

                                    {players.map(p => (
                                        <div key={p.id} className={`flex justify-between items-center p-4 rounded-2xl border-2 transition-all ${p.active?'bg-white border-white shadow-sm':'bg-slate-100 border-transparent opacity-50 grayscale'}`}>
                                            <div className="flex items-center gap-3 flex-1 overflow-hidden">
                                                <div className={`w-10 h-10 rounded-full flex items-center justify-center font-black text-xs shrink-0 ${p.gender==='M'?'bg-blue-50 text-blue-600':'bg-pink-50 text-pink-600'}`}>{p.gender}</div>
                                                <div className="flex-1">
                                                    {(editingId === p.id && !isFinished) ? (
                                                        <input 
                                                            autoFocus
                                                            className="w-full bg-slate-50 border-b-2 border-indigo-500 outline-none font-black text-slate-800 text-sm"
                                                            value={p.name}
                                                            onChange={(e) => updatePlayerName(p.id, e.target.value)}
                                                            onBlur={() => setEditingId(null)}
                                                            onKeyDown={(e) => e.key === 'Enter' && setEditingId(null)}
                                                        />
                                                    ) : (
                                                        <div 
                                                            onClick={() => !isFinished && setEditingId(p.id)}
                                                            className={`font-black text-slate-800 text-sm truncate ${!isFinished ? 'cursor-pointer hover:text-indigo-600' : ''}`}
                                                        >
                                                            {p.name}
                                                        </div>
                                                    )}
                                                    <div className="text-[9px] text-slate-400 font-bold uppercase">Main: {getPlayCount(p.id)}x</div>
                                                </div>
                                            </div>
                                            {!isFinished && (
                                                <button onClick={() => togglePlayer(p.id)} className={`text-[9px] font-black px-4 py-2 rounded-xl transition-all shrink-0 ml-2 ${p.active?'bg-indigo-600 text-white shadow-md shadow-indigo-100':'bg-white text-slate-400 border border-slate-200'}`}>
                                                    {p.active ? 'MAIN' : 'ISTIRAHAT'}
                                                </button>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'matches' && (
                            <div className="space-y-4 animate-in fade-in slide-in-from-right-4 duration-500 pb-10">
                                {matches.length === 0 && (
                                    <div className="text-center py-20 opacity-30 font-black uppercase tracking-widest text-xs">Belum ada pertandingan</div>
                                )}
                                {matches.map(m => (
                                    <div key={m.id} className={`bg-white p-5 rounded-[2.5rem] border-2 transition-all ${m.done?'border-slate-50 opacity-90':'border-indigo-100 shadow-xl shadow-indigo-50'}`}>
                                        <div className="flex justify-between items-center mb-4">
                                            <div className="flex flex-col">
                                                <span className="text-[11px] font-black text-slate-900 uppercase">GAME {m.matchNumber}</span>
                                                <span className="text-[8px] font-bold uppercase text-indigo-400">{m.type}</span>
                                            </div>
                                            {(m.done && !isFinished) && <button onClick={() => setMatches(matches.map(ma => ma.id === m.id ? {...ma, done: false} : ma))} className="text-[9px] font-black text-indigo-400 uppercase hover:bg-indigo-50 px-2 py-1 rounded-lg">Edit</button>}
                                        </div>
                                        <div className="space-y-6">
                                            {[1, 2].map(teamNum => (
                                                <div key={teamNum} className="flex items-center justify-between gap-4">
                                                    <div className="flex-1 space-y-1">
                                                        {(teamNum === 1 ? m.t1 : m.t2).map(playerId => (
                                                            <div key={playerId} className="relative">
                                                                {(!m.done && !isFinished) ? (
                                                                    <div className="flex items-center gap-2 bg-slate-50 p-1 rounded-lg border border-slate-100">
                                                                        <div className={`w-2 h-2 rounded-full ${getPGender(playerId)==='M'?'bg-blue-400':'bg-pink-400'}`}></div>
                                                                        <select 
                                                                            value={playerId}
                                                                            onChange={(e) => swapPlayerInMatch(m.id, playerId, e.target.value)}
                                                                            className="bg-transparent text-sm font-black text-slate-800 outline-none w-full"
                                                                        >
                                                                            <option value={playerId}>{getPName(playerId)}</option>
                                                                            {players.filter(p => p.active && !m.t1.includes(p.id) && !m.t2.includes(p.id)).map(p => (
                                                                                <option key={p.id} value={p.id}>{p.name}</option>
                                                                            ))}
                                                                        </select>
                                                                    </div>
                                                                ) : (
                                                                    <div className="text-sm font-black flex items-center gap-2">
                                                                        <div className={`w-1.5 h-1.5 rounded-full ${getPGender(playerId)==='M'?'bg-blue-400':'bg-pink-400'}`}></div>
                                                                        {getPName(playerId)}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        ))}
                                                    </div>
                                                    <input 
                                                        type="number" 
                                                        disabled={m.done || isFinished}
                                                        onFocus={handleScoreFocus}
                                                        className={`w-16 h-16 text-center rounded-2xl font-black text-2xl border-none transition-colors ${(m.done || isFinished) ? 'bg-indigo-50 text-indigo-900' : 'bg-slate-100 text-indigo-900 focus:ring-4 focus:ring-indigo-100'}`} 
                                                        value={teamNum === 1 ? m.s1 : m.s2} 
                                                        onChange={e => setMatches(matches.map(ma => ma.id === m.id ? {...ma, [teamNum===1?'s1':'s2']: e.target.value === "" ? 0 : parseInt(e.target.value)||0} : ma))} 
                                                    />
                                                </div>
                                            ))}
                                            {(!m.done && !isFinished) && <button onClick={() => setMatches(matches.map(ma => ma.id === m.id ? {...ma, done: true} : ma))} className="w-full py-4 bg-indigo-600 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-indigo-100 active:scale-95 transition-transform">SIMPAN SKOR</button>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'standings' && (
                            <div className="animate-in fade-in duration-500 pb-10">
                                {isFinished && (
                                    <div className="bg-amber-50 border-2 border-amber-200 rounded-3xl p-6 mb-6 text-center shadow-lg shadow-amber-900/5">
                                        <h3 className="text-amber-800 font-black text-lg uppercase tracking-tighter mb-1">
                                            {eventDetails.title || "Papan Juara"}
                                        </h3>
                                        <div className="flex flex-col gap-1 mb-4">
                                            <p className="text-amber-600 text-[10px] font-bold uppercase tracking-widest">
                                                {eventDetails.location && `📍 ${eventDetails.location}`}
                                                {eventDetails.location && eventDetails.date && ' | '}
                                                {eventDetails.date && `📅 ${eventDetails.date}`}
                                            </p>
                                        </div>
                                        <div className="flex flex-wrap gap-2 justify-center">
                                            <button 
                                                onClick={shareStandings}
                                                className="bg-indigo-600 text-white py-3 px-6 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-indigo-700 transition-all flex items-center gap-2"
                                            >
                                                📤 Share Klasemen
                                            </button>
                                            <button 
                                                onClick={saveReport}
                                                className="bg-white text-amber-700 border-2 border-amber-200 py-3 px-6 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-amber-100 transition-all flex items-center gap-2"
                                            >
                                                💾 Simpan .txt
                                            </button>
                                        </div>
                                    </div>
                                )}
                                
                                {!isFinished && eventDetails.title && (
                                    <div className="px-4 py-3 bg-indigo-50 rounded-2xl mb-4 border border-indigo-100">
                                         <h4 className="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-1">Event Saat Ini</h4>
                                         <p className="font-black text-indigo-900 text-sm truncate">{eventDetails.title}</p>
                                    </div>
                                )}

                                <div id="standings-table" className="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
                                    <div className="p-4 text-center border-b border-slate-50 bg-white">
                                        <h2 className="font-black text-sm uppercase tracking-tighter">{eventDetails.title || 'Americano Pro'}</h2>
                                        <p className="text-[9px] font-bold text-slate-400">{eventDetails.date}</p>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left min-w-[420px]">
                                            <thead className="bg-slate-50 text-[9px] font-black uppercase text-slate-400 tracking-widest border-b border-slate-100">
                                                <tr>
                                                    <th className="py-5 px-4 text-center">Pos</th>
                                                    <th className="py-5 px-2">Pemain</th>
                                                    <th className="py-5 px-2 text-center">MP</th>
                                                    <th className="py-5 px-2 text-center">PF</th>
                                                    <th className="py-5 px-2 text-center">PA</th>
                                                    <th className="py-5 px-2 text-center">+/-</th>
                                                    <th className="py-5 px-2 text-center bg-indigo-50 text-indigo-600">Win</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {getStandings().map((p, i) => (
                                                    <tr key={p.id} className={isFinished && i === 0 ? 'bg-amber-50/50 final-rank-1' : ''}>
                                                        <td className="py-5 px-4 text-center">
                                                            {isFinished && i === 0 ? (
                                                                <span className="text-xl">👑</span>
                                                            ) : (
                                                                <span className="font-black text-xs text-slate-300">{i + 1}</span>
                                                            )}
                                                        </td>
                                                        <td className="py-5 px-2">
                                                            <div className="flex flex-col text-xs font-black uppercase truncate max-w-[100px]">
                                                                {p.name} 
                                                                <span className="text-[8px] opacity-40">{p.wins}W-{p.loses}L</span>
                                                            </div>
                                                        </td>
                                                        <td className="py-5 px-2 text-center font-bold text-[10px] text-slate-400">{p.played}</td>
                                                        <td className="py-5 px-2 text-center font-bold text-[10px] text-slate-500">{p.pf}</td>
                                                        <td className="py-5 px-2 text-center font-bold text-[10px] text-slate-500">{p.pa}</td>
                                                        <td className="py-5 px-2 text-center">
                                                            <span className={`font-black text-[10px] ${p.diff > 0 ? 'text-emerald-500' : p.diff < 0 ? 'text-rose-500' : 'text-slate-300'}`}>
                                                                {p.diff > 0 ? '+' : ''}{p.diff}
                                                            </span>
                                                        </td>
                                                        <td className="py-5 px-2 text-center">
                                                            <div className={`w-8 h-8 flex items-center justify-center rounded-xl font-black mx-auto text-xs ${isFinished && i === 0 ? 'bg-amber-500 text-white shadow-lg shadow-amber-200' : 'bg-indigo-600 text-white'}`}>
                                                                {p.pts}
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {((view === 'setup' || view === 'matches') && !isFinished) && (
                        <div className="floating-btn-container animate-in slide-in-from-bottom-10 duration-300">
                            <button onClick={generateRound} className="w-full py-5 bg-slate-900 text-white rounded-3xl font-black shadow-2xl active:scale-95 transition-all tracking-[0.1em] uppercase text-xs border-4 border-white hover:bg-slate-800">
                                {matches.length === 0 ? "BUAT PERTANDINGAN PERTAMA" : "BUAT PERTANDINGAN BERIKUTNYA"}
                            </button>
                        </div>
                    )}

                    <div className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl p-5 border-t border-slate-100 flex justify-around text-[9px] font-black text-slate-400 max-w-md mx-auto z-50 rounded-t-[2.5rem] shadow-2xl">
                        <div className="text-center group"><p className="text-blue-600 text-base mb-0.5">{players.filter(p=>p.active && p.gender==='M').length}</p><p className="tracking-widest uppercase">♂ Pria</p></div>
                        <div className="text-center group"><p className="text-pink-600 text-base mb-0.5">{players.filter(p=>p.active && p.gender==='W').length}</p><p className="tracking-widest uppercase">♀ Wanita</p></div>
                        <div className="text-center group"><p className="text-indigo-600 text-base mb-0.5">{matches.length}</p><p className="tracking-widest uppercase">Total</p></div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
